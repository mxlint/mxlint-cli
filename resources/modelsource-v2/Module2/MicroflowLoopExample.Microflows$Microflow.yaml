        - $Type: Microflows$LoopedActivity
          Documentation: ""
          ErrorHandlingType: Rollback
          LoopSource:
            $Type: Microflows$IterableList
            ListVariableName: UserList
            VariableName: IteratorUser
          ObjectCollection:
            $Type: Microflows$MicroflowObjectCollection
            Objects:
                - $Type: Microflows$ExclusiveSplit
                  Caption: Blocked?
                  Documentation: ""
                  ErrorHandlingType: Rollback
                  SplitCondition:
                    $Type: Microflows$ExpressionSplitCondition
                    Expression: $IteratorUser/Blocked
                - $Type: Microflows$ActionActivity
                  Action:
                    $Type: Microflows$ChangeAction
                    ChangeVariableName: IteratorUser
                    Commit: "Yes"
                    ErrorHandlingType: Rollback
                    Items:
                        - $Type: Microflows$ChangeActionItem
                          Association: ""
                          Attribute: System.User.Blocked
                          Value: "false"
                    RefreshInClient: false
                  AutoGenerateCaption: true
                  BackgroundColor: Default
                  Caption: Activity
                  Disabled: false
                  Documentation: ""
                - $Type: Microflows$ActionActivity
                  Action:
                    $Type: Microflows$LogMessageAction
                    ErrorHandlingType: Rollback
                    IncludeLatestStackTrace: false
                    Level: Info
                    MessageTemplate:
                        $Type: Microflows$StringTemplate
                        Parameters:
                            - $Type: Microflows$TemplateParameter
                              Expression: $IteratorUser/Name
                        Text: User {1} not blocked
                    Node: '''Module2'''
                  AutoGenerateCaption: true
                  BackgroundColor: Default
                  Caption: Activity
                  Disabled: false
                  Documentation: ""
                - $Type: Microflows$ActionActivity
                  Action:
                    $Type: Microflows$MicroflowCallAction
                    ErrorHandlingType: Rollback
                    MicroflowCall:
                        $Type: Microflows$MicroflowCall
                        Microflow: Module2.SubMicroflowExample
                        ParameterMappings:
                            - $Type: Microflows$MicroflowCallParameterMapping
                              Argument: $IteratorUser
                              Parameter: Module2.SubMicroflowExample.User
                        QueueSettings: null
                    ResultVariableName: ""
                    UseReturnVariable: true
                  AutoGenerateCaption: true
                  BackgroundColor: Default
                  Caption: Activity
                  Disabled: false
                  Documentation: ""
ReturnVariableName: ""
Url: ""
UrlSearchParameters: []
WorkflowActionInfo: null
pseudocode: |-
    MICROFLOW: MicroflowLoopExample
    RETURN TYPE: void

    PSEUDOCODE
    ----------
    BEGIN

      UserList = retrieve from database System.User

      FOR EACH IteratorUser IN UserList
        IF $IteratorUser/Blocked THEN
          IteratorUser.Blocked = false
          commit IteratorUser
          call Module2.SubMicroflowExample(User = $IteratorUser)
        ELSE
          log info: "User {1} not blocked"
        END IF
      END FOR


    END
