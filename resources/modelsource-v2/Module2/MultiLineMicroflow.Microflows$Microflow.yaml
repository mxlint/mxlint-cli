$Type: Microflows$Microflow
AllowConcurrentExecution: true
AllowedModuleRoles: []
ApplyEntityAccess: false
ConcurrencyErrorMicroflow: ""
ConcurrenyErrorMessage:
    $Type: Texts$Text
    Items: []
Documentation: ""
Excluded: false
ExportLevel: Hidden
MarkAsUsed: false
MicroflowActionInfo: null
MicroflowReturnType:
    $Type: DataTypes$VoidType
Name: MultiLineMicroflow
ObjectCollection:
    $Type: Microflows$MicroflowObjectCollection
    Objects:
        - $Type: Microflows$StartEvent
        - $Type: Microflows$EndEvent
          Documentation: ""
          ReturnValue: ""
        - $Type: Microflows$ExclusiveSplit
          Caption: hello
          Documentation: ""
          ErrorHandlingType: Rollback
          SplitCondition:
            $Type: Microflows$ExpressionSplitCondition
            Expression: |-
                if $currentUser/Name = 'Hello' then
                true
                else if $currentUser/Active then
                true
                else if $currentUser/Blocked then
                false
                    else if $currentUser/FailedLogins > 0 then
                false

                else
                false
        - $Type: Microflows$EndEvent
          Documentation: ""
          ReturnValue: ""
        - $Type: Microflows$ActionActivity
          Action:
            $Type: Microflows$ChangeAction
            ChangeVariableName: currentUser
            Commit: "No"
            ErrorHandlingType: Rollback
            Items:
                - $Type: Microflows$ChangeActionItem
                  Association: ""
                  Attribute: System.User.Name
                  Value: "    if $currentUser/Name = 'a' then\n'b'\nelse if $currentUser/Name = 'b' then\n'c'\nelse\n$currentUser/Name\n"
            RefreshInClient: false
          AutoGenerateCaption: true
          BackgroundColor: Default
          Caption: Activity
          Disabled: false
          Documentation: ""
ReturnVariableName: ""
Url: ""
UrlSearchParameters: []
WorkflowActionInfo: null
pseudocode: "MICROFLOW: MultiLineMicroflow\nRETURN TYPE: void\n\nPSEUDOCODE\n----------\nBEGIN\n\n  IF \n\nif $currentUser/Name = 'Hello' then\ntrue\nelse if $currentUser/Active then\ntrue\nelse if $currentUser/Blocked then\nfalse\n    else if $currentUser/FailedLogins > 0 then\nfalse\n\nelse\nfalse THEN\n    GOTO L001\n  ELSE\n    GOTO L002\n  END IF\n\n  LABEL L001\n  currentUser.Name =     if $currentUser/Name = 'a' then\n'b'\nelse if $currentUser/Name = 'b' then\n'c'\nelse\n$currentUser/Name\n\n\n\n  LABEL L002\n\nEND"
