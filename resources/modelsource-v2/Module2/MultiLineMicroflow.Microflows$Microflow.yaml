pseudocode: |-
    MICROFLOW: MultiLineMicroflow
    RETURN TYPE: void

    PSEUDOCODE
    ----------
    BEGIN

      IF if $currentUser/Name = 'Hello' then
    true
    else if $currentUser/Active then
    true
    else if $currentUser/Blocked then
    false
        else if $currentUser/FailedLogins > 0 then
    false

    else
    false THEN
        GOTO L001
      ELSE
        GOTO L002
      END IF

      LABEL L001
      currentUser.Name =     if $currentUser/Name = 'a' then
    'b'
    else if $currentUser/Name = 'b' then
    'c'
    else
    $currentUser/Name



      LABEL L002

    END
