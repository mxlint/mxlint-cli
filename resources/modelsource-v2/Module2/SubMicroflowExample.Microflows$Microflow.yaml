pseudocode: |-
    MICROFLOW: SubMicroflowExample
    RETURN TYPE: void
    PARAMETERS:
      - User: System.User (required)

    PSEUDOCODE
    ----------
    BEGIN

      log info: "Hello {1}"

      counter = 10

      LABEL L001

      IF $counter > 0 THEN
        GOTO L003
      ELSE
        GOTO L002
      END IF

      LABEL L002

      LABEL L003
      counter = $counter - 1
      GOTO L001

    END
