$Type: Microflows$Microflow
AllowConcurrentExecution: true
AllowedModuleRoles: []
ApplyEntityAccess: false
ConcurrencyErrorMicroflow: ""
ConcurrenyErrorMessage:
    $Type: Texts$Text
    Items: []
Documentation: ""
Excluded: false
ExportLevel: Hidden
MarkAsUsed: false
MicroflowActionInfo: null
MicroflowReturnType:
    $Type: DataTypes$VoidType
Name: SubMicroflowExample
ObjectCollection:
    $Type: Microflows$MicroflowObjectCollection
    Objects:
        - $Type: Microflows$StartEvent
        - $Type: Microflows$EndEvent
          Documentation: ""
          ReturnValue: ""
        - $Type: Microflows$MicroflowParameter
          DefaultValue: ""
          Documentation: ""
          HasVariableNameBeenChanged: false
          IsRequired: true
          Name: User
          VariableType:
            $Type: DataTypes$ObjectType
            Entity: System.User
        - $Type: Microflows$ActionActivity
          Action:
            $Type: Microflows$LogMessageAction
            ErrorHandlingType: Rollback
            IncludeLatestStackTrace: false
            Level: Info
            MessageTemplate:
                $Type: Microflows$StringTemplate
                Parameters:
                    - $Type: Microflows$TemplateParameter
                      Expression: $User/Name
                Text: Hello {1}
            Node: '''Example'''
          AutoGenerateCaption: true
          BackgroundColor: Default
          Caption: Activity
          Disabled: false
          Documentation: ""
        - $Type: Microflows$ExclusiveSplit
          Caption: more than 0?
          Documentation: ""
          ErrorHandlingType: Rollback
          SplitCondition:
            $Type: Microflows$ExpressionSplitCondition
            Expression: $counter > 0
        - $Type: Microflows$ActionActivity
          Action:
            $Type: Microflows$CreateVariableAction
            ErrorHandlingType: Rollback
            InitialValue: "10"
            VariableName: counter
            VariableType:
                $Type: DataTypes$IntegerType
          AutoGenerateCaption: true
          BackgroundColor: Default
          Caption: Activity
          Disabled: false
          Documentation: ""
        - $Type: Microflows$ExclusiveMerge
        - $Type: Microflows$ActionActivity
          Action:
            $Type: Microflows$ChangeVariableAction
            ChangeVariableName: counter
            ErrorHandlingType: Rollback
            Value: $counter - 1
          AutoGenerateCaption: true
          BackgroundColor: Default
          Caption: Activity
          Disabled: false
          Documentation: ""
ReturnVariableName: ""
Url: ""
UrlSearchParameters: []
WorkflowActionInfo: null
pseudocode: |-
    MICROFLOW: SubMicroflowExample
    RETURN TYPE: void
    PARAMETERS:
      - User: System.User (required)

    PSEUDOCODE
    ----------
    BEGIN

      log info: "Hello {1}"

      counter = 10

      LABEL L001

      IF $counter > 0 THEN
        GOTO L003
      ELSE
        GOTO L002
      END IF

      LABEL L002

      LABEL L003
      counter = $counter - 1
      GOTO L001

    END
