pseudocode: |-
    MICROFLOW: MicroflowLoop
    RETURN TYPE: void

    PSEUDOCODE
    ----------
    BEGIN

      counter = 10

      LABEL L001

      IF $counter > 0 THEN
        GOTO L002
      ELSE
        GOTO L003
      END IF

      LABEL L002

      LABEL L003
      counter = $counter-1
      GOTO L001

    END
