$Type: Microflows$Microflow
AllowConcurrentExecution: true
AllowedModuleRoles: []
ApplyEntityAccess: false
ConcurrencyErrorMicroflow: ""
ConcurrenyErrorMessage:
    $Type: Texts$Text
    Items: []
Documentation: ""
Excluded: false
ExportLevel: Hidden
MarkAsUsed: false
MicroflowActionInfo: null
MicroflowReturnType:
    $Type: DataTypes$VoidType
Name: MicroflowLoopNested
ObjectCollection:
    $Type: Microflows$MicroflowObjectCollection
    Objects:
        - $Type: Microflows$StartEvent
        - $Type: Microflows$EndEvent
          Documentation: ""
          ReturnValue: ""
        - $Type: Microflows$ActionActivity
          Action:
            $Type: Microflows$CreateVariableAction
            ErrorHandlingType: Rollback
            InitialValue: "10"
            VariableName: counter
            VariableType:
                $Type: DataTypes$IntegerType
          AutoGenerateCaption: true
          BackgroundColor: Default
          Caption: Activity
          Disabled: false
          Documentation: ""
        - $Type: Microflows$ExclusiveSplit
          Caption: Enough?
          Documentation: ""
          ErrorHandlingType: Rollback
          SplitCondition:
            $Type: Microflows$ExpressionSplitCondition
            Expression: $counter > 0
        - $Type: Microflows$ActionActivity
          Action:
            $Type: Microflows$ChangeVariableAction
            ChangeVariableName: counter
            ErrorHandlingType: Rollback
            Value: $counter-1
          AutoGenerateCaption: true
          BackgroundColor: Default
          Caption: Activity
          Disabled: false
          Documentation: ""
        - $Type: Microflows$ExclusiveMerge
        - $Type: Microflows$ExclusiveSplit
          Caption: more?
          Documentation: ""
          ErrorHandlingType: Rollback
          SplitCondition:
            $Type: Microflows$ExpressionSplitCondition
            Expression: $counter2 > 0
        - $Type: Microflows$ActionActivity
          Action:
            $Type: Microflows$CreateVariableAction
            ErrorHandlingType: Rollback
            InitialValue: "20"
            VariableName: counter2
            VariableType:
                $Type: DataTypes$IntegerType
          AutoGenerateCaption: true
          BackgroundColor: Default
          Caption: Activity
          Disabled: false
          Documentation: ""
        - $Type: Microflows$ActionActivity
          Action:
            $Type: Microflows$ChangeVariableAction
            ChangeVariableName: counter2
            ErrorHandlingType: Rollback
            Value: $counter2-1
          AutoGenerateCaption: true
          BackgroundColor: Default
          Caption: Activity
          Disabled: false
          Documentation: ""
        - $Type: Microflows$ExclusiveMerge
ReturnVariableName: ""
Url: ""
UrlSearchParameters: []
WorkflowActionInfo: null
pseudocode: |-
    MICROFLOW: MicroflowLoopNested
    RETURN TYPE: void

    PSEUDOCODE
    ----------
    BEGIN

      counter = 10

      LABEL L001

      IF $counter > 0 THEN
        GOTO L002
      ELSE
        GOTO L003
      END IF

      LABEL L002

      LABEL L003
      counter2 = 20

      LABEL L004

      IF $counter2 > 0 THEN
        GOTO L006
      ELSE
        GOTO L005
      END IF

      LABEL L005
      counter = $counter-1
      GOTO L001

      LABEL L006
      counter2 = $counter2-1
      GOTO L004

    END
