pseudocode: |-
    MICROFLOW: MicroflowLoopNested
    RETURN TYPE: void

    PSEUDOCODE
    ----------
    BEGIN

      counter = 10

      LABEL L001

      IF $counter > 0 THEN
        GOTO L002
      ELSE
        GOTO L003
      END IF

      LABEL L002

      LABEL L003
      counter2 = 20

      LABEL L004

      IF $counter2 > 0 THEN
        GOTO L006
      ELSE
        GOTO L005
      END IF

      LABEL L005
      counter = $counter-1
      GOTO L001

      LABEL L006
      counter2 = $counter2-1
      GOTO L004

    END
